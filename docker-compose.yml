services:
  postgres:
    image: postgres:16-alpine
    container_name: church-connect-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: church_connect
      POSTGRES_USER: church_user
      POSTGRES_PASSWORD: church_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
